name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  lint:
    name: fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Honors rust-toolchain.toml (channel 1.96.0 + rustfmt + clippy).
      - run: rustup show active-toolchain || rustup toolchain install
      - uses: Swatinem/rust-cache@v2
      - name: rustfmt
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --all-targets -- -D warnings

  test:
    name: integration test (Docker)
    runs-on: ubuntu-latest
    # ubuntu-latest runners ship a running Docker daemon; the integration test
    # pulls surrealdb/surrealdb:v3.1.2 and manages its own container via bollard.
    steps:
      - uses: actions/checkout@v4
      - run: rustup show active-toolchain || rustup toolchain install
      - uses: Swatinem/rust-cache@v2
      - name: cargo test
        run: cargo test --test integration_test
