[package]
name = "surrealdb_live_message"
version = "0.1.0"
edition = "2024"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
tokio = { version = "1.48.0", features = ["full", "macros", "rt-multi-thread"] }
tokio-stream = "0.1.17"
# surrealdb = { version = "2.3.10", features = ["kv-mem"] }
surrealdb = { git = "https://github.com/surrealdb/surrealdb", tag = "v3.0.0-alpha.16", features = ["kv-surrealkv"] }
surrealdb-types = { git = "https://github.com/surrealdb/surrealdb", tag = "v3.0.0-alpha.16" }
futures = "0.3.31"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.145"
anyhow = "1.0.100"
tracing = "0.1.41"
tracing-subscriber = "0.3.20"
tokio-graceful-shutdown = "0.19.2"
config = "0.15.19"
bollard = "0.19.4"
reqwest = { version = "0.12.24", default-features = false, features = [
    "blocking",
    "gzip",
] }

[dev-dependencies]
[target.'cfg(unix)'.dev-dependencies]
nix = { version = "0.30.1", default-features = false, features = ["signal"] }
futures = "0.3.31"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.145"
tracing = "0.1.41"
tracing-subscriber = "0.3.20"
